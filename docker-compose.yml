services:
  nvim:
    image: archlinux:latest
    command: nvim
    stdin_open: true
    tty: true
    volumes:
      - .:/root/.config/nvim
      - nvim-data:/root/.local/share/nvim
      - undodir:/root/.vim/undodir
      - pacman-cache:/var/cache/pacman/pkg
    entrypoint: >
      sh -c '
        echo "Server = https://geo.mirror.pkgbuild.com/\$$repo/os/\$$arch" > /etc/pacman.d/mirrorlist &&
        pacman -Sy --noconfirm neovim git gcc unzip curl ripgrep &&
        exec nvim
      '

volumes:
  nvim-data:
  undodir:
  pacman-cache:
